name: Environments

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: |
          echo "Test deployment"
          echo "USERNAME = ${{vars.USERNAME}}"
          echo "PASSWORD = ${{secrets.PASSWORD}}"
          
  DEVELOPMENT:
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: Deploy
        run: |
          echo "Deployed to DEV"
          echo "USERNAME = ${{vars.USERNAME}}"
          echo "PASSWORD = ${{secrets.PASSWORD}}"

  STAGING:
    runs-on: ubuntu-latest
    needs: DEVELOPMENT
    environment: Stage
  
    steps:
      - name: Deploy
        run: |
          echo "Deployed to Stage"      
          echo "USERNAME = ${{vars.USERNAME}}"
          echo "PASSWORD = ${{secrets.PASSWORD}}"
          
  PRODUCTION:
    runs-on: ubuntu-latest
    needs: STAGING
    environment: ProdUCTION

    steps:
      - name: Deploy
        run: |
            echo "Deployed to Prod"    
            echo "USERNAME = ${{vars.USERNAME}}"
            echo "PASSWORD = ${{secrets.PASSWORD}}"
